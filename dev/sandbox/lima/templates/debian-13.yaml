# Toride Lima sandbox — Debian 13
# See docs/lima-sandbox.md for full contract.
#
# Usage:
#   limactl create --tty=false --name=toride-d13 --mount-none dev/sandbox/lima/templates/debian-13.yaml
#   limactl start toride-d13

minimumLimaVersion: "2.0.0"
vmType: vz
arch: default
cpus: 2
memory: 4GiB
disk: 24GiB

images:
  - location: "~/os/toride/dev/sandbox/lima/images/debian-13/image-aarch64.qcow2"
    arch: "aarch64"
  - location: "~/os/toride/dev/sandbox/lima/images/debian-13/image-x86_64.qcow2"
    arch: "x86_64"

mounts: []

containerd:
  system: false
  user: false

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux
      if command -v cloud-init >/dev/null 2>&1; then
        cloud-init status --wait || true
      fi
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y ca-certificates curl sudo openssh-server systemd systemd-sysv iproute2
      systemctl enable ssh || true
      systemctl start ssh || true
